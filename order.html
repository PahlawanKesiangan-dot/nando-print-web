<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Nando Print</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 20px; color: #1a202c; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* HEADER & STATS */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 14px; color: #718096; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #4b6cb7; }

        /* KONTROL TOKO */
        .admin-controls { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 25px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .switch-group { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        
        /* TABLE STYLE */
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 15px; color: #64748b; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; font-size: 14px; }
        
        /* FILE LIST UI */
        .file-list { display: flex; flex-wrap: wrap; gap: 5px; }
        .file-badge { background: #edf2f7; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid #cbd5e0; }
        .file-badge:hover { background: #e2e8f0; }

        /* STATUS BADGE */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .antri { background: #fef3c7; color: #92400e; }
        .proses { background: #dcfce7; color: #166534; }
        .selesai { background: #e0e7ff; color: #3730a3; }

        /* BUTTONS */
        .btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-wa { background: #25d366; color: white; }
        .btn-del { background: #fee2e2; color: #dc2626; }

        /* MODAL */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:20px; border-radius:15px; max-width:90%; max-height:90%; overflow:auto; text-align:center; }
        #previewImg { max-width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛠️ Dashboard Admin Print Nando</h1>
        <button class="btn" onclick="location.reload()" style="background:#4b6cb7; color:white;">🔄 Refresh Data</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Total Omzet</h3><p id="omzetText">Rp 0</p></div>
        <div class="stat-card"><h3>Pesanan Antri</h3><p id="antriText">0</p></div>
        <div class="stat-card"><h3>Total Pesanan</h3><p id="totalText">0</p></div>
    </div>

    <div class="admin-controls">
        <div class="switch-group">
            <span>🔴 Toko Tutup</span>
            <input type="checkbox" id="tokoToggle" onchange="updateToko(this.checked)">
            <span>🟢 Buka</span>
        </div>
        |
        <div class="switch-group">
            <span>Stok A4:</span>
            <input type="checkbox" id="stokA4" onchange="updateStok('a4', this.checked)">
        </div>
        <div class="switch-group">
            <span>Stok F4:</span>
            <input type="checkbox" id="stokF4" onchange="updateStok('f4', this.checked)">
        </div>
        <div class="switch-group">
            <span>Stok Foto:</span>
            <input type="checkbox" id="stokFoto" onchange="updateStok('foto', this.checked)">
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Nama & WA</th>
                    <th>File & Detail</th>
                    <th>Metode & Bukti</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="orderTable">
                </tbody>
        </table>
    </div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="previewImg" src="">
        <h3 id="previewTitle" style="margin-top:15px"></h3>
        <button class="btn" id="downloadBtn" style="background:#4b6cb7; color:white; width:100%; padding:15px; margin-top:10px;">💾 Download File</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB4CBP0S3dhsxEb17ToVhFEE7Kvjw_7j88",
        authDomain: "print-nndo.firebaseapp.com",
        databaseURL: "https://print-nndo-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "print-nndo",
        storageBucket: "print-nndo.firebasestorage.app",
        messagingSenderId: "1030448319199",
        appId: "1:1030448319199:web:1e2680491f95760e88776a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Sinkronisasi Kontrol (Toko & Stok)
    db.ref('pengaturan').on('value', snap => {
        const data = snap.val();
        if(data) {
            document.getElementById('tokoToggle').checked = data.toko_buka;
            document.getElementById('stokA4').checked = data.stok.a4;
            document.getElementById('stokF4').checked = data.stok.f4;
            document.getElementById('stokFoto').checked = data.stok.foto;
        }
    });

    function updateToko(val) { db.ref('pengaturan/toko_buka').set(val); }
    function updateStok(key, val) { db.ref('pengaturan/stok/' + key).set(val); }

    // 2. Load Pesanan
    db.ref('pesanan_nando').on('value', snap => {
        const orders = snap.val();
        const table = document.getElementById('orderTable');
        table.innerHTML = "";
        
        let totalOmzet = 0, totalAntri = 0, count = 0;

        if(!orders) return;

        Object.keys(orders).reverse().forEach(id => {
            const o = orders[id];
            count++;
            if(o.status === "Antri") totalAntri++;
            if(o.status === "Selesai") totalOmzet += o.total;

            // Generate list file
            let fileBadges = "";
            if (o.semua_file) {
                o.semua_file.forEach((file, index) => {
                    fileBadges += `<span class="file-badge" onclick="previewFile('${file.nama}', '${file.isi}', '${file.tipe}')">📄 ${file.nama}</span> `;
                });
            }

            const row = `
                <tr>
                    <td><small>${o.date}</small></td>
                    <td><strong>${o.nama}</strong><br><small>${o.telp}</small></td>
                    <td>
                        <div class="file-list">${fileBadges}</div>
                        <div style="margin-top:5px; font-size:11px; color:#718096">
                            ${o.jenis} | ${o.qty_per_file} lembar/file
                        </div>
                    </td>
                    <td>
                        <strong>${o.metode}</strong><br>
                        ${o.bukti_bayar ? `<button class="btn" style="background:#faad14; color:white; padding:2px 6px; font-size:10px" onclick="previewFile('Bukti Bayar', '${o.bukti_bayar}', 'image/png')">Cek Bukti</button>` : `<small>Gak ada bukti</small>`}
                    </td>
                    <td style="font-weight:bold; color:#4b6cb7">Rp ${o.total.toLocaleString()}</td>
                    <td><span class="badge ${o.status.toLowerCase()}" onclick="ubahStatus('${id}', '${o.status}')">${o.status}</span></td>
                    <td>
                        <button class="btn btn-wa" onclick="kontakWA('${o.telp}', '${o.nama}')">WA</button>
                        <button class="btn btn-del" onclick="hapus('${id}')">🗑️</button>
                    </td>
                </tr>
            `;
            table.innerHTML += row;
        });

        document.getElementById('omzetText').innerText = "Rp " + totalOmzet.toLocaleString();
        document.getElementById('antriText').innerText = totalAntri;
        document.getElementById('totalText').innerText = count;
    });

    function previewFile(nama, data, tipe) {
        const modal = document.getElementById('modal');
        const img = document.getElementById('previewImg');
        const title = document.getElementById('previewTitle');
        const dBtn = document.getElementById('downloadBtn');

        title.innerText = nama;
        modal.style.display = 'flex';

        if(tipe.startsWith('image/')) {
            img.src = data;
            img.style.display = 'block';
        } else {
            img.style.display = 'none'; // Kalau PDF/Excel gak bisa preview langsung
            title.innerText = "📄 " + nama + " (Dokumen)";
        }

        // Fungsi Download
        dBtn.onclick = () => {
            const link = document.createElement('a');
            link.href = data;
            link.download = nama;
            link.click();
        };
    }

    function ubahStatus(id, s) {
        let n = s === "Antri" ? "Proses" : (s === "Proses" ? "Selesai" : "Antri");
        db.ref('pesanan_nando/' + id).update({ status: n });
    }

    function hapus(id) {
        if(confirm("Hapus pesanan ini dari sejarah, Nan?")) db.ref('pesanan_nando/' + id).remove();
    }

    function kontakWA(t, n) {
        let hp = t.replace(/\D/g, ''); 
        if (hp.startsWith('0')) hp = '62' + hp.slice(1);
        window.open(`https://wa.me/${hp}?text=Halo ${n}, ini Nando Print. Pesanan lo lagi diproses ya!`, '_blank');
    }
</script>
</body>
</html>
